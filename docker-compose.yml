version: "3.8"

services:
  backend:
    build: ./backend        # תיקיית ה-backend שלנו
    ports:
      - "8000:8000"         # backend נגיש מבחוץ על פורט 8000
    env_file:
      - ./backend/.env
    depends_on:
      - rag-service
      - agent-service
    networks:
      - ai-network

  rag-service:
    build: ./rag-service     # פרויקט 1
    ports:
      - "8001:8001"
    env_file:
      - ./rag-service/.env
    networks:
      - ai-network

  agent-service:
    build: ./agent-service   # פרויקט 2
    ports:
      - "8002:8002"
    env_file:
      - ./agent-service/.env
    networks:
      - ai-network

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - ai-network
      
networks:
  ai-network:
    driver: bridge